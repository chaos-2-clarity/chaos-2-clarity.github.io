<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos to Clarity - AI & Automation for Scalable Operations</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background: white;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 100vh;
            padding: 30px 20px;
            box-sizing: border-box;
        }
        
        .brand-logo {
            width: 700px;
            max-width: 90%;
            height: auto;
            margin-bottom: 20px;
        }
        
        video {
            width: 70vw;
            max-width: 900px;
            height: auto;
            max-height: 50vh;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        
        .construction-text {
            color: #192D55;
            font-size: 2.5em;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .brand-logo {
                width: 90%;
                margin-bottom: 15px;
            }
            
            video {
                width: 95vw;
                margin-bottom: 20px;
            }
            
            .construction-text {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="chaos_logo.png" alt="Chaos to Clarity Logo" class="brand-logo">
        
        <video autoplay muted loop playsinline>
            <source src="chaos_animation.webm" type="video/webm">
            Your browser doesn't support HTML5 video.
        </video>
        
        <div class="construction-text">Site Under Construction</div>
    </div>
</body>
</html>
