<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos to Clarity - AI & Automation for Scalable Operations</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        video {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw;
            height: 85vh;
            max-width: 85%;
            max-height: 70%;
            object-fit: contain;
            z-index: 1;
            border-radius: 12px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            padding: 30px 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }
        
        .brand-logo {
            width: 300px;
            height: auto;
            margin-top: 50px;
            opacity: 1;
            z-index: 3;
            position: relative;
        }
        
        .content {
            text-align: center;
            margin-top: 20px;
        }
        
        h1 {
            color: white;
            font-size: 3em;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
        }
        
        h1 span {
            color: #4A90E2;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
        }
        
        .tagline {
            color: #4A90E2;
            font-size: 1.3em;
            font-weight: 500;
            margin-bottom: 15px;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.2);
        }
        
        p {
            color: #999999;
            font-size: 1.1em;
            margin-bottom: 0;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.3);
        }
        
        .email-form {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        input {
            padding: 14px 20px;
            border: 2px solid #4A90E2;
            border-radius: 6px;
            font-size: 1em;
            min-width: 280px;
            background: white;
            color: #192D55;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #192D55;
        }
        
        input::placeholder {
            color: #a0aec0;
        }
        
        button {
            padding: 14px 40px;
            background: linear-gradient(135deg, #4A90E2 0%, #192D55 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(74, 144, 226, 0.3);
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            
            .tagline {
                font-size: 1.1em;
            }
            
            p {
                font-size: 1em;
            }
            
            video {
                width: 90vw;
            }
            
            input {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <video autoplay muted loop playsinline>
            <source src="chaos_animation.webm" type="video/webm">
            Your browser doesn't support HTML5 video.
        </video>
        
        <img src="chaos_logo.png" alt="Chaos to Clarity Logo" class="brand-logo">
    </div>
    
    <script>
        function handleSubmit(event) {
            event.preventDefault();
            alert('Thanks! We\'ll be in touch soon.');
            event.target.reset();
        }
    </script>
</body>
</html>
