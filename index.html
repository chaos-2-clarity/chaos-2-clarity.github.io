<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos to Clarity - AI & Automation for Scalable Operations</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4f8 100%);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            max-width: 900px;
            width: 100%;
        }
        
        .brand-logo {
            width: 120px;
            height: auto;
            margin-bottom: 40px;
            opacity: 0.95;
        }
        
        video {
            width: 70vw;
            max-width: 900px;
            height: auto;
            margin-bottom: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(25, 45, 85, 0.15);
            background: white;
            padding: 10px;
        }
        
        .content {
            text-align: center;
        }
        
        h1 {
            color: #192D55;
            font-size: 2.8em;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        h1 span {
            color: #4A90E2;
        }
        
        .tagline {
            color: #4A90E2;
            font-size: 1.3em;
            font-weight: 500;
            margin-bottom: 25px;
        }
        
        p {
            color: #5a6c7d;
            font-size: 1.1em;
            margin-bottom: 35px;
            line-height: 1.7;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .email-form {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        input {
            padding: 14px 20px;
            border: 2px solid #4A90E2;
            border-radius: 6px;
            font-size: 1em;
            min-width: 280px;
            background: white;
            color: #192D55;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #192D55;
        }
        
        input::placeholder {
            color: #a0aec0;
        }
        
        button {
            padding: 14px 40px;
            background: linear-gradient(135deg, #4A90E2 0%, #192D55 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(74, 144, 226, 0.3);
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            
            .tagline {
                font-size: 1.1em;
            }
            
            p {
                font-size: 1em;
            }
            
            video {
                width: 90vw;
            }
            
            input {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Logo_Chaos.png" alt="Chaos to Clarity Logo" class="brand-logo">
        
        <video autoplay muted loop playsinline>
            <source src="Logo_.mp4" type="video/mp4">
            Your browser doesn't support HTML5 video.
        </video>
        
        <div class="content">
            <h1>Chaos to <span>Clarity</span></h1>
            <div class="tagline">From Chaos to Clarity</div>
            <p>Transforming chaotic processes into clear, actionable insights and intelligent automation.</p>
        </div>
    </div>
    
    <script>
        function handleSubmit(event) {
            event.preventDefault();
            alert('Thanks! We\'ll be in touch soon.');
            event.target.reset();
        }
    </script>
</body>
</html>
