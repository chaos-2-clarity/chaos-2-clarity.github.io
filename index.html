<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos to Clarity - AI & Automation for Scalable Operations</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fbfdff;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .video-container {
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }
        
        .video-container:hover {
            transform: scale(1.15);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function ChaosToClarity() {
            const [isHovering, setIsHovering] = useState(false);

            return (
                <div className="min-h-screen bg-blue-50 flex flex-col items-center justify-center px-6 py-12" style={{ backgroundColor: '#fbfdff' }}>
                    {/* Logo */}
                    <img
                        src="chaos_logo.png"
                        alt="Chaos to Clarity Logo"
                        className="w-full max-w-2xl mb-8"
                    />

                    {/* Animation with hover zoom */}
                    <div
                        className="video-container"
                        onMouseEnter={() => setIsHovering(true)}
                        onMouseLeave={() => setIsHovering(false)}
                        style={{
                            transform: isHovering ? 'scale(1.15)' : 'scale(1)',
                        }}
                    >
                        <video
                            autoPlay
                            muted
                            loop
                            playsInline
                            className="w-full max-w-4xl rounded-lg"
                            style={{
                                maxHeight: '60vh',
                                objectFit: 'contain',
                            }}
                        >
                            <source src="chaos_animation.webm" type="video/webm" />
                            Your browser doesn't support HTML5 video.
                        </video>
                    </div>

                    {/* Under Construction Text */}
                    <h1 className="text-5xl font-bold text-blue-900 mt-12 text-center">
                        Site Under Construction
                    </h1>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ChaosToClarity />);
    </script>
</body>
</html>
